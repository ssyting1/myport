<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Simon Ting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-linen: #f8f7f5;
            --brand-text: #1f1f1f;
            --brand-dark-gray: #4b5563;
            --brand-border: #e8e8e6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--brand-linen);
            color: var(--brand-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        
        .success-container {
            text-align: center;
            max-width: 500px;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
        }
        
        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        
        p {
            font-size: 18px;
            color: var(--brand-dark-gray);
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--brand-text);
            text-decoration: none;
            padding: 16px 32px;
            border: 1px solid var(--brand-border);
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: var(--brand-text);
            color: var(--brand-linen);
            border-color: var(--brand-text);
        }
        
        .back-link svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <path d="M20 6L9 17l-5-5"/>
            </svg>
        </div>
        <h1>Thank You!</h1>
        <p>Your message has been sent successfully. I'll get back to you as soon as possible.</p>
        <a href="/" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Portfolio
        </a>
    </div>
</body>
</html>
